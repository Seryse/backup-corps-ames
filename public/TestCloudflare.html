<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Cloudflare SFU</title>
<style>
  body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
  button { background: #222; color: #0f0; border: 1px solid #0f0; padding: 8px 16px; margin: 4px; cursor: pointer; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #log { background: #000; padding: 10px; height: 300px; overflow-y: auto; font-size: 12px; }
  video { background: #000; border: 1px solid #333; }
  .row { display: flex; gap: 20px; margin: 10px 0; }
  input { background: #222; color: #0f0; border: 1px solid #333; padding: 6px; width: 400px; }
</style>
</head>
<body>
<h2>🔧 Test Cloudflare SFU — Push/Pull</h2>

<div>
  <label>App ID:</label><br>
  <input id="appId" placeholder="9f6d4a98a2ba9b825a862fda7ff86123" />
</div>
<div style="margin-top:8px">
  <label>API Token:</label><br>
  <input id="apiToken" type="password" placeholder="ton token ici" />
</div>

<div style="margin-top: 16px;">
  <button id="btnPublish" onclick="startPublish()">📡 1. Publier (Praticien)</button>
  <button id="btnSubscribe" onclick="startSubscribe()" disabled>👂 2. S'abonner (Client)</button>
  <button onclick="clearLog()">🗑 Vider les logs</button>
</div>

<div class="row" style="margin-top:16px">
  <div>
    <p>📹 Caméra locale (Praticien)</p>
    <video id="localVideo" autoplay playsinline muted width="320" height="240"></video>
  </div>
  <div>
    <p>📺 Flux reçu (Client)</p>
    <video id="remoteVideo" autoplay playsinline width="320" height="240"></video>
  </div>
</div>

<div style="margin-top:16px">
  <p>📋 Logs :</p>
  <div id="log"></div>
</div>

<script>
  let publisherSessionId = null;
  let audioTrackName = null;
  let videoTrackName = null;

  function log(msg, color = '#0f0') {
    const div = document.getElementById('log');
    const time = new Date().toLocaleTimeString();
    div.innerHTML += `<div style="color:${color}">[${time}] ${msg}</div>`;
    div.scrollTop = div.scrollHeight;
  }

  function clearLog() { document.getElementById('log').innerHTML = ''; }

  function getBase() {
    const appId = document.getElementById('appId').value.trim();
    return `https://rtc.live.cloudflare.com/v1/apps/${appId}`;
  }

  function getToken() {
    return document.getElementById('apiToken').value.trim();
  }

  async function cfPost(path, body) {
    const res = await fetch(getBase() + path, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${getToken()}`,
      },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(`CF POST ${path} → ${res.status}: ${JSON.stringify(data)}`);
    return data;
  }

  async function cfPut(path, body) {
    const res = await fetch(getBase() + path, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${getToken()}`,
      },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(`CF PUT ${path} → ${res.status}: ${JSON.stringify(data)}`);
    return data;
  }

  // ── PUBLISHER (Praticien) ─────────────────────────────────────────────────
  async function startPublish() {
    document.getElementById('btnPublish').disabled = true;
    try {
      log('📡 Démarrage publication...');

      // 1. Capturer caméra + micro
      const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      document.getElementById('localVideo').srcObject = stream;
      log('✅ Caméra locale capturée');

      // 2. Créer PeerConnection
      const pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.cloudflare.com:3478' }],
        bundlePolicy: 'max-bundle',
      });

      // 3. Ajouter tracks
      const audioTrack = stream.getAudioTracks()[0];
      const videoTrack = stream.getVideoTracks()[0];

      const ts = Date.now();
      audioTrackName = `test_audio_${ts}`;
      videoTrackName = `test_video_${ts}`;

      const audioT = pc.addTransceiver(audioTrack, { direction: 'sendonly' });
      const videoT = pc.addTransceiver(videoTrack, { direction: 'sendonly' });

      log(`📌 Track audio: ${audioTrackName} (mid: ${audioT.mid})`);
      log(`📌 Track video: ${videoTrackName} (mid: ${videoT.mid})`);

      // 4. Créer offer
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      log('📝 Offer SDP créée');

      // 5. Créer session CF avec SDP
      const sessionData = await cfPost('/sessions/new', {
        sessionDescription: { type: offer.type, sdp: offer.sdp },
      });
      publisherSessionId = sessionData.sessionId;
      log(`✅ Session CF créée: ${publisherSessionId}`, '#ff0');

      await pc.setRemoteDescription(new RTCSessionDescription(sessionData.sessionDescription));
      log('✅ Remote description appliquée');

      // 6. Enregistrer les tracks
      const tracksData = await cfPost(`/sessions/${publisherSessionId}/tracks/new`, {
        tracks: [
          { location: 'local', mid: audioT.mid, trackName: audioTrackName },
          { location: 'local', mid: videoT.mid, trackName: videoTrackName },
        ],
      });
      log(`✅ Tracks enregistrées: ${JSON.stringify(tracksData)}`, '#0ff');

      if (tracksData.requiresImmediateRenegotiation) {
        log('🔄 Renegociation nécessaire...');
        const renegOffer = await pc.createOffer();
        await pc.setLocalDescription(renegOffer);
        const renegData = await cfPut(`/sessions/${publisherSessionId}/renegotiate`, {
          sessionDescription: { type: renegOffer.type, sdp: renegOffer.sdp },
        });
        await pc.setRemoteDescription(new RTCSessionDescription(renegData.sessionDescription));
        log('✅ Renegociation terminée');
      }

      log('🎉 Publication active ! Session ID: ' + publisherSessionId, '#0f0');
      log('➡️ Cliquez maintenant sur "S\'abonner"', '#ff0');
      document.getElementById('btnSubscribe').disabled = false;

    } catch (e) {
      log(`❌ ERREUR: ${e.message}`, '#f00');
      document.getElementById('btnPublish').disabled = false;
    }
  }

  // ── SUBSCRIBER (Client) ───────────────────────────────────────────────────
  async function startSubscribe() {
    document.getElementById('btnSubscribe').disabled = true;
    try {
      log('👂 Démarrage abonnement...', '#0ff');

      if (!publisherSessionId) {
        throw new Error('Pas de session publisher — publiez d\'abord !');
      }

      // 1. Créer PeerConnection client
      const pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.cloudflare.com:3478' }],
        bundlePolicy: 'max-bundle',
      });

      const remoteStream = new MediaStream();
      document.getElementById('remoteVideo').srcObject = remoteStream;

      pc.ontrack = (event) => {
        log(`🎵 Track reçue: ${event.track.kind} (id: ${event.track.id})`, '#ff0');
        remoteStream.addTrack(event.track);
      };

      // 2. Transceivers recvonly
      const audioRecv = pc.addTransceiver('audio', { direction: 'recvonly' });
      const videoRecv = pc.addTransceiver('video', { direction: 'recvonly' });

      // 3. Créer offer
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      log('📝 Offer SDP client créée');

      // 4. Créer session CF client
      const sessionData = await cfPost('/sessions/new', {
        sessionDescription: { type: offer.type, sdp: offer.sdp },
      });
      const clientSessionId = sessionData.sessionId;
      log(`✅ Session CF client créée: ${clientSessionId}`, '#ff0');

      await pc.setRemoteDescription(new RTCSessionDescription(sessionData.sessionDescription));
      log('✅ Remote description client appliquée');

      // 5. Pull les tracks du publisher
      log(`🔗 Pull depuis session publisher: ${publisherSessionId}`);
      log(`🔗 Audio track: ${audioTrackName}`);
      log(`🔗 Video track: ${videoTrackName}`);

      const pullData = await cfPost(`/sessions/${clientSessionId}/tracks/new`, {
        tracks: [
          {
            location: 'remote',
            trackName: audioTrackName,
            mid: audioRecv.mid,
            sessionId: publisherSessionId, // ← SESSION DU PUBLISHER
          },
          {
            location: 'remote',
            trackName: videoTrackName,
            mid: videoRecv.mid,
            sessionId: publisherSessionId, // ← SESSION DU PUBLISHER
          },
        ],
      });

      log(`📦 Réponse pull: ${JSON.stringify(pullData)}`, '#0ff');

      if (pullData.requiresImmediateRenegotiation) {
        log('🔄 Renegociation client nécessaire...');
        // CF nous envoie une offer → on répond avec un answer
        if (pullData.sessionDescription.type === 'offer') {
          await pc.setRemoteDescription(new RTCSessionDescription(pullData.sessionDescription));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          await cfPut(`/sessions/${clientSessionId}/renegotiate`, {
            sessionDescription: { type: answer.type, sdp: answer.sdp },
          });
          log('✅ Renegociation client terminée (offer→answer)');
        }
      } else {
        await pc.setRemoteDescription(new RTCSessionDescription(pullData.sessionDescription));
        log('✅ Remote description pull appliquée');
      }

      log('🎉 Abonnement actif ! Les tracks devraient arriver...', '#0f0');

    } catch (e) {
      log(`❌ ERREUR: ${e.message}`, '#f00');
      document.getElementById('btnSubscribe').disabled = false;
    }
  }
</script>
</body>
</html>
